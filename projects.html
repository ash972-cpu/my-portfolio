<!DOCTYPE html>
<html lang="en" x-data="projects()" :class="{'dark':dark}" x-init="init()" class="scroll-smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects — Ashish Kumar Mishra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet"/>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{display:['PT Sans','sans-serif'],body:['DM Sans','sans-serif']},colors:{accent:'#FF6B2B','accent-light':'#FF8F5C'}}}}</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;}
    html{font-family:'DM Sans',sans-serif;}
    h1,h2,h3,h4,h5,h6{font-family:'PT Sans',sans-serif;}
    .reveal{opacity:0;transform:translateY(22px);transition:opacity .55s cubic-bezier(.4,0,.2,1),transform .55s cubic-bezier(.4,0,.2,1);}
    .reveal.visible{opacity:1;transform:translateY(0);}
    .nav-link{position:relative;}
    .nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1.5px;background:currentColor;transition:width .25s cubic-bezier(.4,0,.2,1);}
    .nav-link:hover::after{width:100%;}
    ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#FF6B2B;border-radius:99px;}
    body{transition:background-color .3s,color .3s;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}
    .btn-primary{position:relative;overflow:hidden;}
    .btn-primary::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:rgba(255,255,255,.18);transform:skewX(-20deg);transition:left .4s cubic-bezier(.4,0,.2,1);}
    .btn-primary:hover::after{left:160%;}
    [x-cloak]{display:none!important;}
    .photo-frame{position:relative;overflow:hidden;background:#e4e4e7;}
    .photo-frame img{width:100%;height:100%;object-fit:cover;display:block;}
    .project-card{transition:transform .3s cubic-bezier(.4,0,.2,1),border-color .2s;}
    .project-card:hover{transform:translateY(-4px);}
  </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-body antialiased">

  <header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
    :class="scrolled?'bg-white/90 dark:bg-zinc-950/90 backdrop-blur-md shadow-sm shadow-black/5':'bg-transparent'">
    <nav class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="font-display font-bold text-xl tracking-tight z-10">
        <span class="text-zinc-900 dark:text-white">ash</span><span class="text-accent">ish</span>
      </a>
      <ul class="hidden md:flex items-center gap-8 text-sm font-medium">
        <li><a href="index.html#services" class="nav-link text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors">Pillars</a></li>
        <li><a href="projects.html" class="nav-link text-accent font-medium">Work</a></li>
        <li><a href="index.html#about" class="nav-link text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors">About</a></li>
        <li><a href="index.html#milestones" class="nav-link text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors">Milestones</a></li>
        <li><a href="index.html#contact" class="nav-link text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors">Contact</a></li>
      </ul>
      <div class="flex items-center gap-3">
        <button @click="dark=!dark;localStorage.setItem('theme',dark?'dark':'light')" class="w-9 h-9 flex items-center justify-center rounded-full border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
          <svg x-show="!dark" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg x-show="dark" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
        </button>
        <a href="index.html#contact" class="hidden md:inline-flex items-center gap-2 btn-primary bg-accent text-white text-sm font-medium px-5 py-2 rounded-full hover:bg-accent-light transition-colors">Connect →</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="pt-36 pb-12 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-80 h-80 bg-accent/10 rounded-full blur-3xl pointer-events-none"></div>
      <div class="max-w-6xl mx-auto px-6 relative z-10">
        <p class="reveal text-xs font-medium text-accent tracking-widest uppercase mb-3">Repository</p>
        <h1 class="reveal font-display font-bold text-5xl md:text-6xl text-zinc-900 dark:text-white leading-tight mb-4">Data Projects</h1>
        <p class="reveal text-lg text-zinc-500 dark:text-zinc-400 max-w-xl leading-relaxed mb-8">An indexed breakdown of my exploratory data analyses, predictive Python pipelines, and BI dashboards.</p>
        <div class="reveal flex flex-wrap gap-2">
          <template x-for="f in filterOptions" :key="f.value">
            <button
              @click="filter = f.value"
              :class="filter === f.value ? 'bg-accent text-white border-accent' : 'bg-white dark:bg-zinc-900 text-zinc-600 dark:text-zinc-400 border-zinc-200 dark:border-zinc-700 hover:border-accent'"
              class="text-sm px-4 py-1.5 rounded-full border transition-colors"
              x-text="f.label">
            </button>
          </template>
        </div>
      </div>
    </section>

    <section class="pb-24">
      <div class="max-w-6xl mx-auto px-6">
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
          <template x-for="p in allProjects" :key="p.id">
            <div
              x-show="filter === 'all' || p.category === filter"
              x-transition:enter="transition ease-out duration-300"
              x-transition:enter-start="opacity-0 scale-95 translate-y-2"
              x-transition:enter-end="opacity-100 scale-100 translate-y-0"
              x-transition:leave="transition ease-in duration-200"
              x-transition:leave-start="opacity-100 scale-100"
              x-transition:leave-end="opacity-0 scale-95">
              <article class="project-card group h-full rounded-2xl overflow-hidden bg-white dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 hover:border-accent transition-colors flex flex-col justify-between">
                <div>
                  <a :href="p.url" class="block photo-frame w-full h-52">
                    <img :src="p.img" :alt="p.title" loading="lazy"/>
                  </a>
                  <div class="p-6">
                    <div class="flex flex-wrap gap-2 mb-3">
                      <template x-for="tag in p.tags" :key="tag">
                        <span class="text-xs px-2.5 py-1 rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400" x-text="tag"></span>
                      </template>
                    </div>
                    <a :href="p.url">
                      <h3 class="font-display font-bold text-lg text-zinc-900 dark:text-white mb-2 group-hover:text-accent transition-colors" x-text="p.title"></h3>
                    </a>
                    <p class="text-sm text-zinc-500 dark:text-zinc-400 leading-relaxed mb-4" x-text="p.desc"></p>
                  </div>
                </div>
                <div class="p-6 pt-0 flex items-center justify-between">
                  <a :href="p.url" class="inline-flex items-center gap-1.5 text-sm font-medium text-zinc-900 dark:text-white nav-link">View details →</a>
                  <span class="text-xs text-zinc-400" x-text="p.year"></span>
                </div>
              </article>
            </div>
          </template>
        </div>
      </div>
    </section>
  </main>

  <footer class="border-t border-zinc-100 dark:border-zinc-900">
    <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
      <p class="text-sm text-zinc-400">&copy; <span id="year"></span> Ashish Kumar Mishra. All rights reserved.</p>
      <p class="text-xs text-zinc-500">Built with Tailwind CSS & Alpine.js</p>
    </div>
  </footer>

  <script>
    function projects() {
      return {
        dark: false, scrolled: false, filter: 'all',
        filterOptions: [
          { value: 'all',     label: 'All Pipelines' },
          { value: 'python',  label: 'Python / ML' },
          { value: 'bi',      label: 'BI & Dashboards' },
          { value: 'sim',     label: 'Simulations' }
        ],
        allProjects: [
          { id:1, title:'Healthcare Risk Stratification App', category:'python', tags:['Python','Scikit-Learn','Pandas'], year:'2026', desc:'Predicting patient hospital readmission risk from clinical histories; resolved heavy class imbalance and data outliers.', img:'https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=700&q=80', url:'case-study.html' },
          { id:2, title:'Air Quality (AQI) Seasonal Dashboard', category:'bi', tags:['Advanced Excel','Power BI','CPCB'], year:'2026', desc:'Aggregated 10+ raw government datasets to track PM2.5, PM10, and NO2 pollution spikes across major Indian metropolises.', img:'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=700&q=80', url:'#' },
          { id:3, title:'Applied AI Optimization Framework', category:'sim', tags:['Applied AI','1M1B Intern'], year:'2026', desc:'Deploying AI tooling and modern data frameworks to untangle real-world localized environmental data roadblocks.', img:'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=700&q=80', url:'#' },
          { id:4, title:'Enterprise Analytics Job Simulation', category:'sim', tags:['Deloitte','Data Scoping'], year:'2025', desc:'Executed an industry standard workflow: raw data scoping, data wrangling, and presenting strategic executive recommendations.', img:'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=700&q=80', url:'#' }
        ],
        init() {
          this.dark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
          window.addEventListener('scroll', () => { this.scrolled = window.scrollY > 20; }, { passive: true });
        }
      }
    }
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
